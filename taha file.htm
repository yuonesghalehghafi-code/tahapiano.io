<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>گروه A</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-box{
width:90%;
max-width:700px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.header{
background:linear-gradient(135deg,#2563eb,#06b6d4);
padding:25px;
text-align:center;
color:white;
}

.header h1{
font-size:38px;
font-weight:900;
letter-spacing:2px;
}

.header p{
margin-top:8px;
opacity:.9;
}

.messages{
padding:30px;
background:#f8fafc;
}

.message{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
border-right:6px solid #2563eb;
}

.name{
font-weight:900;
font-size:20px;
color:#2563eb;
margin-bottom:10px;
}

.text{
font-size:18px;
line-height:2;
color:#222;
}

.footer{
padding:15px;
text-align:center;
background:#eef2ff;
font-weight:bold;
color:#2563eb;
}

</style>

</head>
<body>

<div class="chat-box">

<div class="header">
<h1>✨ گروه A ✨</h1>
<p>گروه اختصاصی اعضا</p>
</div>

<div class="messages">

<div class="message">

<div class="name">
📢 مدیر :طاها قلعه قافی
</div>

<div class="text">
سلام دوستان عزیز 🌹<br><br>

به گروه A خوش آمدید. <br>

لطفاً احترام یکدیگر را حفظ کنید و پیام‌های مرتبط ارسال نمایید. 🤝<br><br>

امیدواریم لحظات خوبی در کنار هم داشته باشیم. ✨
</div>

</div>

</div>

<div class="footer">
👥 تعداد اعضا: 10 نفر
</div>

</div>

</body>
</html>
